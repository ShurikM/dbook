<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="650" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.5">dbook — Database Intelligence Layer for AI Agents</text>

  <!-- === AGENTS LAYER === -->
  <text x="40" y="72" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">AI AGENTS</text>

  <!-- Agent boxes -->
  <rect x="40" y="82" width="185" height="52" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="132" y="103" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">🏦 Billing Agent</text>
  <text x="132" y="122" text-anchor="middle" fill="#bbf7d0" font-size="10">Process refunds, invoices</text>

  <rect x="245" y="82" width="185" height="52" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="337" y="103" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">🛒 Sales Agent</text>
  <text x="337" y="122" text-anchor="middle" fill="#bbf7d0" font-size="10">Inventory, orders, carts</text>

  <rect x="450" y="82" width="185" height="52" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="542" y="103" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">📊 Analytics Agent</text>
  <text x="542" y="122" text-anchor="middle" fill="#bbf7d0" font-size="10">Metrics, funnels, A/B tests</text>

  <rect x="655" y="82" width="185" height="52" rx="10" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="747" y="103" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">🎧 Support Agent</text>
  <text x="747" y="122" text-anchor="middle" fill="#bbf7d0" font-size="10">Tickets, FAQs, identity</text>

  <!-- Arrows from agents to dbook -->
  <line x1="132" y1="134" x2="132" y2="172" stroke="#4ade80" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="337" y1="134" x2="337" y2="172" stroke="#4ade80" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="542" y1="134" x2="542" y2="172" stroke="#4ade80" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="747" y1="134" x2="747" y2="172" stroke="#4ade80" stroke-width="2" stroke-dasharray="4,3"/>

  <text x="450" y="164" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="600">query metadata · validate SQL · get metrics</text>

  <!-- === DBOOK LAYER === -->
  <rect x="30" y="172" width="840" height="260" rx="14" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="198" text-anchor="middle" fill="#c4b5fd" font-size="16" font-weight="700">📖 dbook</text>
  <text x="450" y="216" text-anchor="middle" fill="#a78bfa" font-size="11">compile once → all agents benefit → always current</text>

  <!-- Capability cards - Row 1 -->
  <rect x="50" y="232" width="155" height="60" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="127" y="254" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">Enum Values</text>
  <text x="127" y="272" text-anchor="middle" fill="#a5b4fc" font-size="9">pending, shipped, delivered</text>
  <text x="127" y="284" text-anchor="middle" fill="#a5b4fc" font-size="9">auto-detected via SQL</text>

  <rect x="215" y="232" width="155" height="60" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="292" y="254" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">FK Semantics</text>
  <text x="292" y="272" text-anchor="middle" fill="#a5b4fc" font-size="9">→ users (the customer)</text>
  <text x="292" y="284" text-anchor="middle" fill="#a5b4fc" font-size="9">agents understand JOINs</text>

  <rect x="380" y="232" width="155" height="60" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="457" y="254" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">Example Queries</text>
  <text x="457" y="272" text-anchor="middle" fill="#a5b4fc" font-size="9">SELECT...JOIN...WHERE</text>
  <text x="457" y="284" text-anchor="middle" fill="#a5b4fc" font-size="9">patterns agents follow</text>

  <rect x="545" y="232" width="155" height="60" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="622" y="254" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">Auto Metrics</text>
  <text x="622" y="272" text-anchor="middle" fill="#a5b4fc" font-size="9">SUM, COUNT, GROUP BY</text>
  <text x="622" y="284" text-anchor="middle" fill="#a5b4fc" font-size="9">zero configuration</text>

  <rect x="710" y="232" width="150" height="60" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="785" y="254" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">Data Lineage</text>
  <text x="785" y="272" text-anchor="middle" fill="#a5b4fc" font-size="9">source → intermediate</text>
  <text x="785" y="284" text-anchor="middle" fill="#a5b4fc" font-size="9">→ leaf tables</text>

  <!-- Capability cards - Row 2 -->
  <rect x="50" y="302" width="155" height="60" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="127" y="324" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">🛡️ PII Detection</text>
  <text x="127" y="342" text-anchor="middle" fill="#a5b4fc" font-size="9">EMAIL, PHONE, SSN marked</text>
  <text x="127" y="354" text-anchor="middle" fill="#a5b4fc" font-size="9">sample data redacted</text>

  <rect x="215" y="302" width="155" height="60" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="292" y="324" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">✅ Query Validator</text>
  <text x="292" y="342" text-anchor="middle" fill="#a5b4fc" font-size="9">SQLGlot-powered</text>
  <text x="292" y="354" text-anchor="middle" fill="#a5b4fc" font-size="9">catch errors before run</text>

  <rect x="380" y="302" width="155" height="60" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="457" y="324" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">📉 Token Savings</text>
  <text x="457" y="342" text-anchor="middle" fill="#a5b4fc" font-size="9">50% fewer tokens at scale</text>
  <text x="457" y="354" text-anchor="middle" fill="#a5b4fc" font-size="9">progressive navigation</text>

  <rect x="545" y="302" width="155" height="60" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="622" y="324" text-anchor="middle" fill="#e0e7ff" font-size="11" font-weight="600">🔄 Schema Tracking</text>
  <text x="622" y="342" text-anchor="middle" fill="#a5b4fc" font-size="9">hash-based change detect</text>
  <text x="622" y="354" text-anchor="middle" fill="#a5b4fc" font-size="9">incremental recompile</text>

  <!-- No Gold Layer badge -->
  <rect x="710" y="302" width="150" height="60" rx="8" fill="#422006" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="785" y="322" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700">🚫 No Gold Layer</text>
  <text x="785" y="340" text-anchor="middle" fill="#fde68a" font-size="9">agents query silver</text>
  <text x="785" y="352" text-anchor="middle" fill="#fde68a" font-size="9">build views on-demand</text>

  <!-- Benchmark bar -->
  <rect x="50" y="375" width="810" height="42" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="70" y="395" fill="#94a3b8" font-size="10" font-weight="600">BENCHMARK</text>
  <text x="200" y="395" fill="#94a3b8" font-size="10">DDL correctness: </text>
  <text x="305" y="395" fill="#ef4444" font-size="11" font-weight="700">76%</text>
  <text x="340" y="395" fill="#94a3b8" font-size="10">→ dbook: </text>
  <text x="402" y="395" fill="#22c55e" font-size="11" font-weight="700">96%</text>
  <text x="445" y="395" fill="#64748b" font-size="10">│</text>
  <text x="465" y="395" fill="#94a3b8" font-size="10">Token savings at 50 tables: </text>
  <text x="637" y="395" fill="#22c55e" font-size="11" font-weight="700">50%</text>
  <text x="670" y="395" fill="#64748b" font-size="10">│</text>
  <text x="690" y="395" fill="#94a3b8" font-size="10">Discovery: </text>
  <text x="760" y="395" fill="#22c55e" font-size="11" font-weight="700">15/15</text>
  <text x="798" y="395" fill="#94a3b8" font-size="10">tasks</text>

  <!-- Arrow from dbook to DB -->
  <line x1="450" y1="432" x2="450" y2="460" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="445,458 455,458 450,468" fill="#8b5cf6"/>
  <text x="450" y="455" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">  introspect + enrich</text>

  <!-- === DATABASE LAYER === -->
  <rect x="30" y="470" width="840" height="95" rx="14" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="496" text-anchor="middle" fill="#e0f2fe" font-size="14" font-weight="700">🗄️ Any Database — Silver Layer</text>
  <text x="450" y="514" text-anchor="middle" fill="#7dd3fc" font-size="11">PostgreSQL · MySQL · SQLite · Snowflake · BigQuery — 20 to 500+ tables</text>

  <!-- Table icons -->
  <rect x="80" y="525" width="70" height="28" rx="5" fill="#0369a1"/>
  <text x="115" y="544" text-anchor="middle" fill="#bae6fd" font-size="10">users</text>
  <rect x="165" y="525" width="70" height="28" rx="5" fill="#0369a1"/>
  <text x="200" y="544" text-anchor="middle" fill="#bae6fd" font-size="10">orders</text>
  <rect x="250" y="525" width="70" height="28" rx="5" fill="#0369a1"/>
  <text x="285" y="544" text-anchor="middle" fill="#bae6fd" font-size="10">payments</text>
  <rect x="335" y="525" width="70" height="28" rx="5" fill="#0369a1"/>
  <text x="370" y="544" text-anchor="middle" fill="#bae6fd" font-size="10">products</text>
  <rect x="420" y="525" width="70" height="28" rx="5" fill="#0369a1"/>
  <text x="455" y="544" text-anchor="middle" fill="#bae6fd" font-size="10">invoices</text>
  <rect x="505" y="525" width="70" height="28" rx="5" fill="#0369a1"/>
  <text x="540" y="544" text-anchor="middle" fill="#bae6fd" font-size="10">inventory</text>
  <rect x="590" y="525" width="70" height="28" rx="5" fill="#0369a1"/>
  <text x="625" y="544" text-anchor="middle" fill="#bae6fd" font-size="10">events</text>
  <rect x="675" y="525" width="70" height="28" rx="5" fill="#0369a1"/>
  <text x="710" y="544" text-anchor="middle" fill="#bae6fd" font-size="10">tickets</text>
  <rect x="760" y="525" width="70" height="28" rx="5" fill="#0369a1"/>
  <text x="795" y="544" text-anchor="middle" fill="#bae6fd" font-size="10">...</text>

  <!-- Footer -->
  <text x="450" y="595" text-anchor="middle" fill="#64748b" font-size="10">pip install dbook · dbook compile "postgresql://..." --output ./my_dbook · Apache 2.0</text>
  <text x="450" y="615" text-anchor="middle" fill="#475569" font-size="9">github.com/ShurikM/dbook</text>
</svg>
