<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="taskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbookAgentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="baselineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sqlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="evalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="resultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="620" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="460" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.5">Benchmark System Design</text>
  <text x="460" y="56" text-anchor="middle" fill="#94a3b8" font-size="11">How dbook is tested: compile, navigate, query, evaluate</text>

  <!-- ==================== ROW 1: DATABASE ==================== -->
  <rect x="320" y="75" width="280" height="70" rx="12" fill="url(#dbGrad)" filter="url(#shadow)"/>
  <ellipse cx="460" cy="84" rx="135" ry="10" fill="#38bdf8" opacity="0.3"/>
  <text x="460" y="108" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">PostgreSQL Test Database</text>
  <text x="460" y="128" text-anchor="middle" fill="#e0f2fe" font-size="11">7 schemas  /  34 tables  /  realistic data</text>

  <!-- Arrow: DB -> dbook -->
  <line x1="460" y1="145" x2="460" y2="170" stroke="#0ea5e9" stroke-width="2"/>
  <polygon points="455,168 465,168 460,178" fill="#0ea5e9"/>
  <text x="480" y="166" fill="#7dd3fc" font-size="9" font-weight="600">introspect</text>

  <!-- ==================== ROW 2: DBOOK COMPILATION ==================== -->
  <rect x="170" y="180" width="580" height="80" rx="12" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="205" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">dbook Compiler</text>
  <text x="460" y="222" text-anchor="middle" fill="#a78bfa" font-size="11">compile once -- generates navigable metadata layer</text>

  <!-- Output files inside dbook box -->
  <rect x="195" y="232" width="140" height="22" rx="5" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="265" y="247" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="600">NAVIGATION.md</text>

  <rect x="350" y="232" width="130" height="22" rx="5" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="415" y="247" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="600">_manifest.md</text>

  <rect x="495" y="232" width="110" height="22" rx="5" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="550" y="247" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="600">{table}.md</text>

  <rect x="620" y="232" width="115" height="22" rx="5" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="677" y="247" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="600">concepts.json</text>

  <!-- ==================== ROW 3: AGENT TASKS ==================== -->
  <!-- Arrow: dbook -> tasks -->
  <line x1="460" y1="260" x2="460" y2="282" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="455,280 465,280 460,290" fill="#8b5cf6"/>

  <!-- Tasks box -->
  <rect x="250" y="290" width="420" height="55" rx="10" fill="url(#taskGrad)" filter="url(#shadow)"/>
  <text x="460" y="314" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">15 Agent Tasks</text>
  <text x="460" y="334" text-anchor="middle" fill="#fef3c7" font-size="11">B1-B5 Billing    C1-C5 Care    S1-S5 Sales</text>

  <!-- ==================== ROW 4: TWO AGENTS SIDE BY SIDE ==================== -->
  <!-- Arrows: tasks -> agents -->
  <line x1="370" y1="345" x2="260" y2="380" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="256,376 264,383 257,383" fill="#f59e0b"/>

  <line x1="550" y1="345" x2="660" y2="380" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="656,376 663,383 663,376" fill="#f59e0b"/>

  <!-- dbook Agent -->
  <rect x="95" y="382" width="330" height="72" rx="12" fill="url(#dbookAgentGrad)" filter="url(#shadow)"/>
  <text x="260" y="406" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">dbook Agent</text>
  <text x="260" y="424" text-anchor="middle" fill="#bbf7d0" font-size="11">Reads NAVIGATION.md + 2-3 table files</text>
  <text x="260" y="442" text-anchor="middle" fill="#dcfce7" font-size="12" font-weight="700">~7,800 tokens per task</text>

  <!-- Baseline Agent -->
  <rect x="495" y="382" width="330" height="72" rx="12" fill="url(#baselineGrad)" filter="url(#shadow)"/>
  <text x="660" y="406" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Baseline Agent</text>
  <text x="660" y="424" text-anchor="middle" fill="#e2e8f0" font-size="11">Reads full DDL dump (all 34 tables)</text>
  <text x="660" y="442" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">~33,600 tokens per task</text>

  <!-- ==================== ROW 5: SQL + EXECUTION ==================== -->
  <!-- Arrows: agents -> SQL -->
  <line x1="260" y1="454" x2="380" y2="484" stroke="#22c55e" stroke-width="2"/>
  <polygon points="377,480 384,487 377,487" fill="#22c55e"/>

  <line x1="660" y1="454" x2="540" y2="484" stroke="#64748b" stroke-width="2"/>
  <polygon points="543,480 536,487 543,487" fill="#64748b"/>

  <rect x="340" y="486" width="240" height="42" rx="10" fill="url(#sqlGrad)" filter="url(#shadow)"/>
  <text x="460" y="510" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">SQL Generation + Execution</text>
  <text x="460" y="523" text-anchor="middle" fill="#bfdbfe" font-size="10">on PostgreSQL test database</text>

  <!-- ==================== ROW 6: EVALUATION ==================== -->
  <!-- Arrow: SQL -> Evaluation -->
  <line x1="460" y1="528" x2="460" y2="548" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="455,546 465,546 460,556" fill="#3b82f6"/>

  <rect x="220" y="555" width="480" height="55" rx="10" fill="url(#evalGrad)" filter="url(#shadow)"/>
  <text x="460" y="578" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Evaluation  (4 dimensions, scored 1-5)</text>
  <text x="460" y="596" text-anchor="middle" fill="#fce7f3" font-size="10">Table Discovery  /  SQL Correctness  /  Result Accuracy  /  Response Quality</text>

  <!-- ==================== RESULTS CALLOUT ==================== -->
  <rect x="60" y="75" width="230" height="30" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="175" y="95" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">dbook 4.7/5 vs Baseline 3.2/5</text>

  <rect x="630" y="75" width="230" height="30" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="745" y="95" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700">77% token savings</text>
</svg>
