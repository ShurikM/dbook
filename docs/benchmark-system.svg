<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="800" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="0.5">Agents that use dbook succeed. Agents that skip it fail.</text>

  <!-- ================================================================ -->
  <!-- LAYER 1: AI AGENTS + RESULTS                                     -->
  <!-- ================================================================ -->
  <text x="40" y="62" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">LAYER 1 — AI AGENTS</text>

  <!-- LEFT SIDE: With dbook (green, success) -->
  <rect x="30" y="72" width="410" height="155" rx="12" fill="#052e16" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="235" y="94" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700">With dbook</text>
  <text x="235" y="110" text-anchor="middle" fill="#86efac" font-size="11">Reads NAVIGATION.md + 2-3 table files</text>

  <!-- Green agent boxes -->
  <rect x="48" y="120" width="118" height="50" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="107" y="143" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Billing Agent</text>
  <text x="107" y="158" text-anchor="middle" fill="#bbf7d0" font-size="10">~7.7K tokens</text>

  <rect x="178" y="120" width="118" height="50" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="237" y="143" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Care Agent</text>
  <text x="237" y="158" text-anchor="middle" fill="#bbf7d0" font-size="10">~7.9K tokens</text>

  <rect x="308" y="120" width="118" height="50" rx="8" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="367" y="143" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Sales Agent</text>
  <text x="367" y="158" text-anchor="middle" fill="#bbf7d0" font-size="10">~7.9K tokens</text>

  <!-- Score badge (green) -->
  <rect x="155" y="184" width="160" height="32" rx="10" fill="#166534" stroke="#4ade80" stroke-width="2"/>
  <text x="235" y="205" text-anchor="middle" fill="#4ade80" font-size="15" font-weight="700">Score: 4.7 / 5</text>

  <!-- RIGHT SIDE: Without dbook (gray/red, failure) -->
  <rect x="460" y="72" width="410" height="155" rx="12" fill="#1e1b2e" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="665" y="94" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">Without dbook</text>
  <text x="665" y="110" text-anchor="middle" fill="#94a3b8" font-size="11">Reads full DDL dump (all 34 tables)</text>

  <!-- Gray agent boxes -->
  <rect x="478" y="120" width="118" height="50" rx="8" fill="url(#grayGrad)" filter="url(#shadow)"/>
  <text x="537" y="143" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Billing Agent</text>
  <text x="537" y="158" text-anchor="middle" fill="#cbd5e1" font-size="10">~33.6K tokens</text>

  <rect x="608" y="120" width="118" height="50" rx="8" fill="url(#grayGrad)" filter="url(#shadow)"/>
  <text x="667" y="143" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Care Agent</text>
  <text x="667" y="158" text-anchor="middle" fill="#cbd5e1" font-size="10">~33.6K tokens</text>

  <rect x="738" y="120" width="118" height="50" rx="8" fill="url(#grayGrad)" filter="url(#shadow)"/>
  <text x="797" y="143" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Sales Agent</text>
  <text x="797" y="158" text-anchor="middle" fill="#cbd5e1" font-size="10">~33.6K tokens</text>

  <!-- Score badge (red) -->
  <rect x="585" y="184" width="160" height="32" rx="10" fill="#3f1219" stroke="#ef4444" stroke-width="2"/>
  <text x="665" y="205" text-anchor="middle" fill="#ef4444" font-size="15" font-weight="700">Score: 3.2 / 5</text>

  <!-- Arrows from LEFT agents DOWN to dbook layer -->
  <line x1="107" y1="170" x2="107" y2="248" stroke="#4ade80" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="102,246 112,246 107,256" fill="#4ade80"/>
  <line x1="237" y1="170" x2="237" y2="248" stroke="#4ade80" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="232,246 242,246 237,256" fill="#4ade80"/>
  <line x1="367" y1="170" x2="367" y2="248" stroke="#4ade80" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="362,246 372,246 367,256" fill="#4ade80"/>

  <!-- Arrows from RIGHT agents DOWN bypassing dbook to database -->
  <line x1="537" y1="170" x2="537" y2="440" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <polygon points="532,438 542,438 537,448" fill="#64748b" opacity="0.5"/>
  <line x1="667" y1="170" x2="667" y2="440" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <polygon points="662,438 672,438 667,448" fill="#64748b" opacity="0.5"/>
  <line x1="797" y1="170" x2="797" y2="440" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <polygon points="792,438 802,438 797,448" fill="#64748b" opacity="0.5"/>

  <!-- "bypasses" label on right arrows -->
  <text x="830" y="325" fill="#64748b" font-size="10" font-weight="600" transform="rotate(90, 830, 325)">bypasses dbook</text>

  <!-- ================================================================ -->
  <!-- LAYER 2: DBOOK INTELLIGENCE LAYER                                -->
  <!-- ================================================================ -->
  <text x="40" y="268" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">LAYER 2 — INTELLIGENCE</text>

  <rect x="30" y="278" width="420" height="130" rx="14" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="240" y="304" text-anchor="middle" fill="#c4b5fd" font-size="15" font-weight="700">dbook -- Database Intelligence Layer</text>
  <text x="240" y="322" text-anchor="middle" fill="#a78bfa" font-size="11">compile once -- all agents benefit</text>

  <!-- Capability chips row 1 -->
  <rect x="48" y="336" width="112" height="24" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="104" y="352" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="600">NAVIGATION.md</text>

  <rect x="168" y="336" width="112" height="24" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="224" y="352" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="600">Table Metadata</text>

  <rect x="288" y="336" width="100" height="24" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="338" y="352" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="600">Enum Values</text>

  <!-- Capability chips row 2 -->
  <rect x="48" y="368" width="100" height="24" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="98" y="384" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="600">FK Semantics</text>

  <rect x="156" y="368" width="112" height="24" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="212" y="384" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="600">Example Queries</text>

  <rect x="276" y="368" width="108" height="24" rx="6" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="330" y="384" text-anchor="middle" fill="#e0e7ff" font-size="10" font-weight="600">Data Lineage</text>

  <!-- Arrow from dbook to database -->
  <line x1="240" y1="408" x2="240" y2="440" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="235,438 245,438 240,448" fill="#8b5cf6"/>

  <!-- ================================================================ -->
  <!-- LAYER 3: DATABASE                                                -->
  <!-- ================================================================ -->
  <text x="40" y="462" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">LAYER 3 — DATABASE</text>

  <rect x="30" y="472" width="840" height="85" rx="14" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="498" text-anchor="middle" fill="#e0f2fe" font-size="14" font-weight="700">PostgreSQL -- 7 schemas, 34 tables</text>

  <!-- Schema icons -->
  <rect x="60" y="510" width="88" height="28" rx="5" fill="#0369a1"/>
  <text x="104" y="529" text-anchor="middle" fill="#bae6fd" font-size="10">customers</text>

  <rect x="160" y="510" width="88" height="28" rx="5" fill="#0369a1"/>
  <text x="204" y="529" text-anchor="middle" fill="#bae6fd" font-size="10">catalog</text>

  <rect x="260" y="510" width="88" height="28" rx="5" fill="#0369a1"/>
  <text x="304" y="529" text-anchor="middle" fill="#bae6fd" font-size="10">orders</text>

  <rect x="360" y="510" width="88" height="28" rx="5" fill="#0369a1"/>
  <text x="404" y="529" text-anchor="middle" fill="#bae6fd" font-size="10">billing</text>

  <rect x="460" y="510" width="88" height="28" rx="5" fill="#0369a1"/>
  <text x="504" y="529" text-anchor="middle" fill="#bae6fd" font-size="10">analytics</text>

  <rect x="560" y="510" width="88" height="28" rx="5" fill="#0369a1"/>
  <text x="604" y="529" text-anchor="middle" fill="#bae6fd" font-size="10">warehouse</text>

  <rect x="660" y="510" width="88" height="28" rx="5" fill="#0369a1"/>
  <text x="704" y="529" text-anchor="middle" fill="#bae6fd" font-size="10">support</text>

  <rect x="760" y="510" width="88" height="28" rx="5" fill="#0369a1"/>
  <text x="804" y="529" text-anchor="middle" fill="#bae6fd" font-size="10">...</text>

  <!-- ================================================================ -->
  <!-- KEY RESULTS SECTION                                              -->
  <!-- ================================================================ -->
  <text x="40" y="586" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">KEY RESULTS</text>

  <!-- LEFT: Scoring Dimensions (4 rows) -->
  <rect x="30" y="596" width="420" height="192" rx="12" fill="#111827" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="240" y="620" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Scoring Dimensions (1-5)</text>

  <!-- Legend -->
  <rect x="150" y="628" width="10" height="10" rx="2" fill="#22c55e"/>
  <text x="165" y="637" fill="#86efac" font-size="10">dbook</text>
  <rect x="220" y="628" width="10" height="10" rx="2" fill="#64748b"/>
  <text x="235" y="637" fill="#94a3b8" font-size="10">baseline</text>

  <!-- Scale: max bar width = 160px for score 5.0. So score X => X/5 * 160 -->

  <!-- Table Discovery: dbook 4.7 => 150px, baseline 4.3 => 138px -->
  <text x="48" y="660" fill="#cbd5e1" font-size="11">Table Discovery</text>
  <rect x="170" y="649" width="150" height="13" rx="3" fill="#22c55e"/>
  <text x="326" y="660" fill="#4ade80" font-size="11" font-weight="700">4.7</text>
  <rect x="170" y="664" width="138" height="9" rx="3" fill="#64748b" opacity="0.7"/>
  <text x="314" y="672" fill="#94a3b8" font-size="9">4.3</text>

  <!-- SQL Correctness: dbook 4.7 => 150px, baseline 3.0 => 96px -->
  <text x="48" y="694" fill="#cbd5e1" font-size="11">SQL Correctness</text>
  <rect x="170" y="683" width="150" height="13" rx="3" fill="#22c55e"/>
  <text x="326" y="694" fill="#4ade80" font-size="11" font-weight="700">4.7</text>
  <rect x="170" y="698" width="96" height="9" rx="3" fill="#64748b" opacity="0.7"/>
  <text x="272" y="706" fill="#94a3b8" font-size="9">3.0</text>

  <!-- Result Accuracy: dbook 4.3 => 138px, baseline 2.6 => 83px -->
  <text x="48" y="728" fill="#cbd5e1" font-size="11">Result Accuracy</text>
  <rect x="170" y="717" width="138" height="13" rx="3" fill="#22c55e"/>
  <text x="314" y="728" fill="#4ade80" font-size="11" font-weight="700">4.3</text>
  <rect x="170" y="732" width="83" height="9" rx="3" fill="#64748b" opacity="0.7"/>
  <text x="259" y="740" fill="#94a3b8" font-size="9">2.6</text>

  <!-- Response Quality: dbook 4.7 => 150px, baseline 2.7 => 86px -->
  <text x="48" y="762" fill="#cbd5e1" font-size="11">Response Quality</text>
  <rect x="170" y="751" width="150" height="13" rx="3" fill="#22c55e"/>
  <text x="326" y="762" fill="#4ade80" font-size="11" font-weight="700">4.7</text>
  <rect x="170" y="766" width="86" height="9" rx="3" fill="#64748b" opacity="0.7"/>
  <text x="262" y="774" fill="#94a3b8" font-size="9">2.7</text>

  <!-- RIGHT: Token Efficiency by Agent -->
  <rect x="470" y="596" width="400" height="192" rx="12" fill="#111827" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="670" y="620" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Token Efficiency by Agent</text>

  <!-- Legend -->
  <rect x="590" y="628" width="10" height="10" rx="2" fill="#22c55e"/>
  <text x="605" y="637" fill="#86efac" font-size="10">dbook</text>
  <rect x="660" y="628" width="10" height="10" rx="2" fill="#64748b"/>
  <text x="675" y="637" fill="#94a3b8" font-size="10">baseline</text>

  <!-- Scale: max bar = 260px for 33.6K. 7.7K => 260*(7.7/33.6) = 60px, 7.9K => 61px -->

  <!-- Billing Agent -->
  <text x="488" y="664" fill="#cbd5e1" font-size="12" font-weight="600">Billing</text>
  <rect x="558" y="652" width="60" height="15" rx="3" fill="#22c55e"/>
  <text x="624" y="665" fill="#4ade80" font-size="11" font-weight="700">7.7K</text>
  <rect x="558" y="670" width="260" height="10" rx="3" fill="#64748b" opacity="0.7"/>
  <text x="824" y="679" fill="#94a3b8" font-size="9">33.6K</text>

  <!-- Care Agent -->
  <text x="488" y="708" fill="#cbd5e1" font-size="12" font-weight="600">Care</text>
  <rect x="558" y="696" width="61" height="15" rx="3" fill="#22c55e"/>
  <text x="625" y="709" fill="#4ade80" font-size="11" font-weight="700">7.9K</text>
  <rect x="558" y="714" width="260" height="10" rx="3" fill="#64748b" opacity="0.7"/>
  <text x="824" y="723" fill="#94a3b8" font-size="9">33.6K</text>

  <!-- Sales Agent -->
  <text x="488" y="752" fill="#cbd5e1" font-size="12" font-weight="600">Sales</text>
  <rect x="558" y="740" width="61" height="15" rx="3" fill="#22c55e"/>
  <text x="625" y="753" fill="#4ade80" font-size="11" font-weight="700">7.9K</text>
  <rect x="558" y="758" width="260" height="10" rx="3" fill="#64748b" opacity="0.7"/>
  <text x="824" y="767" fill="#94a3b8" font-size="9">33.6K</text>

  <!-- Savings callout -->
  <text x="670" y="786" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="700">77% token savings</text>

  <!-- Footer -->
  <text x="240" y="796" text-anchor="middle" fill="#475569" font-size="9">dbook benchmark -- 15 agent tasks across billing, care, and sales domains</text>
</svg>
