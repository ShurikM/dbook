<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ca8a04;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a16207;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbookGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="consumerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">The Silver Layer Insight</text>

  <!-- === ROW 1: Traditional Pipeline === -->
  <text x="40" y="65" fill="#ef4444" font-size="12" font-weight="600" letter-spacing="0.5">TRADITIONAL</text>
  <text x="175" y="65" fill="#94a3b8" font-size="11">— expensive ETL, manual gold maintenance, goes stale</text>

  <!-- Bronze -->
  <rect x="40" y="78" width="150" height="55" rx="10" fill="url(#bronzeGrad)" filter="url(#shadow2)"/>
  <text x="115" y="101" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Bronze</text>
  <text x="115" y="120" text-anchor="middle" fill="#fde68a" font-size="10">200+ raw tables</text>

  <!-- Arrow -->
  <line x1="190" y1="105" x2="230" y2="105" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="228,100 238,105 228,110" fill="#94a3b8"/>
  <text x="214" y="96" text-anchor="middle" fill="#64748b" font-size="9">ETL</text>

  <!-- Silver -->
  <rect x="240" y="78" width="150" height="55" rx="10" fill="url(#silverGrad)" filter="url(#shadow2)"/>
  <text x="315" y="101" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Silver</text>
  <text x="315" y="120" text-anchor="middle" fill="#cbd5e1" font-size="10">20 clean tables</text>

  <!-- Arrow -->
  <line x1="390" y1="105" x2="430" y2="105" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="428,100 438,105 428,110" fill="#94a3b8"/>
  <text x="414" y="96" text-anchor="middle" fill="#64748b" font-size="9">ETL</text>

  <!-- Gold -->
  <rect x="440" y="78" width="150" height="55" rx="10" fill="url(#goldGrad)" filter="url(#shadow2)"/>
  <text x="515" y="101" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Gold</text>
  <text x="515" y="120" text-anchor="middle" fill="#fef3c7" font-size="10">5 pre-built views</text>

  <!-- Arrow -->
  <line x1="590" y1="105" x2="630" y2="105" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="628,100 638,105 628,110" fill="#94a3b8"/>

  <!-- Consumer -->
  <rect x="640" y="78" width="150" height="55" rx="10" fill="url(#consumerGrad)" filter="url(#shadow2)"/>
  <text x="715" y="101" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Consumer</text>
  <text x="715" y="120" text-anchor="middle" fill="#cbd5e1" font-size="10">limited to gold views</text>

  <!-- Pain points -->
  <rect x="440" y="142" width="350" height="38" rx="6" fill="#1c1917" stroke="#7f1d1d" stroke-width="1"/>
  <text x="615" y="157" text-anchor="middle" fill="#fca5a5" font-size="10">&#x274C; Manual ETL for each use case</text>
  <text x="615" y="171" text-anchor="middle" fill="#fca5a5" font-size="10">&#x274C; Gold goes stale &#xB7; &#x274C; &#x201C;We don&#x2019;t have a table for that&#x201D;</text>

  <!-- === ROW 2: With dbook === -->
  <text x="40" y="215" fill="#22c55e" font-size="12" font-weight="600" letter-spacing="0.5">WITH DBOOK</text>
  <text x="160" y="215" fill="#94a3b8" font-size="11">— agents query silver directly, build views on-demand</text>

  <!-- Bronze -->
  <rect x="40" y="228" width="150" height="55" rx="10" fill="url(#bronzeGrad)" filter="url(#shadow2)"/>
  <text x="115" y="251" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Bronze</text>
  <text x="115" y="270" text-anchor="middle" fill="#fde68a" font-size="10">200+ raw tables</text>

  <!-- Arrow -->
  <line x1="190" y1="255" x2="230" y2="255" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="228,250 238,255 228,260" fill="#94a3b8"/>
  <text x="214" y="246" text-anchor="middle" fill="#64748b" font-size="9">ETL</text>

  <!-- Silver -->
  <rect x="240" y="228" width="150" height="55" rx="10" fill="url(#silverGrad)" filter="url(#shadow2)"/>
  <text x="315" y="251" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">Silver</text>
  <text x="315" y="270" text-anchor="middle" fill="#cbd5e1" font-size="10">20 clean tables</text>

  <!-- Arrow -->
  <line x1="390" y1="255" x2="430" y2="255" stroke="#8b5cf6" stroke-width="2.5"/>
  <polygon points="428,249 440,255 428,261" fill="#8b5cf6"/>
  <text x="414" y="245" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">dbook</text>

  <!-- dbook box -->
  <rect x="440" y="228" width="150" height="55" rx="10" fill="url(#dbookGrad2)" filter="url(#shadow2)"/>
  <text x="515" y="248" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">&#x1F4D6; dbook</text>
  <text x="515" y="264" text-anchor="middle" fill="#e0e7ff" font-size="9">enum values &#xB7; FK semantics</text>
  <text x="515" y="276" text-anchor="middle" fill="#e0e7ff" font-size="9">metrics &#xB7; PII &#xB7; validation</text>

  <!-- Arrow -->
  <line x1="590" y1="255" x2="630" y2="255" stroke="#22c55e" stroke-width="2.5"/>
  <polygon points="628,249 640,255 628,261" fill="#22c55e"/>

  <!-- AI Agent -->
  <rect x="640" y="228" width="150" height="55" rx="10" fill="url(#agentGrad2)" filter="url(#shadow2)"/>
  <text x="715" y="248" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">&#x1F916; AI Agent</text>
  <text x="715" y="264" text-anchor="middle" fill="#bbf7d0" font-size="9">queries silver directly</text>
  <text x="715" y="276" text-anchor="middle" fill="#bbf7d0" font-size="9">builds gold on-demand</text>

  <!-- Benefits -->
  <rect x="440" y="292" width="350" height="38" rx="6" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <text x="615" y="307" text-anchor="middle" fill="#86efac" font-size="10">&#x2705; Less gold maintenance &#xB7; &#x2705; Always current</text>
  <text x="615" y="321" text-anchor="middle" fill="#86efac" font-size="10">&#x2705; Any question answered &#xB7; &#x2705; 96% correctness</text>

  <!-- Crossed out Gold -->
  <rect x="40" y="295" width="120" height="35" rx="6" fill="#1c1917" stroke="#7f1d1d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="100" y="313" text-anchor="middle" fill="#78716c" font-size="11" text-decoration="line-through">Gold Layer</text>
  <text x="100" y="326" text-anchor="middle" fill="#57534e" font-size="9">reduced</text>

  <!-- Footer -->
  <text x="450" y="362" text-anchor="middle" fill="#64748b" font-size="10">dbook compile "postgresql://..." &#x2192; agents understand silver &#x2192; gold layer reduced</text>
</svg>
