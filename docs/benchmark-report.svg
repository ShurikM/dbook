<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <linearGradient id="reportTitleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scorecardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tokenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heatmapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="agentCardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" rx="16" fill="#0f1117"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700" letter-spacing="0.5">Benchmark Report Structure</text>

  <!-- Root: Benchmark Report -->
  <rect x="335" y="50" width="230" height="50" rx="12" fill="url(#reportTitleGrad)" filter="url(#shadow2)"/>
  <text x="450" y="72" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Benchmark Report</text>
  <text x="450" y="88" text-anchor="middle" fill="#fce7f3" font-size="10">HTML + JSON output</text>

  <!-- Connecting lines from Report to children -->
  <!-- To Scorecard -->
  <line x1="370" y1="100" x2="130" y2="145" stroke="#8b5cf6" stroke-width="2"/>
  <!-- To Charts group -->
  <line x1="450" y1="100" x2="390" y2="145" stroke="#3b82f6" stroke-width="2"/>
  <!-- To Heatmap -->
  <line x1="500" y1="100" x2="615" y2="145" stroke="#f59e0b" stroke-width="2"/>
  <!-- To Agent Cards -->
  <line x1="530" y1="100" x2="810" y2="145" stroke="#0ea5e9" stroke-width="2"/>

  <!-- Scorecard -->
  <rect x="30" y="145" width="200" height="95" rx="10" fill="url(#scorecardGrad)" filter="url(#shadow2)"/>
  <text x="130" y="172" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Scorecard</text>
  <rect x="45" y="182" width="170" height="18" rx="4" fill="#4c1d95"/>
  <text x="130" y="196" text-anchor="middle" fill="#c4b5fd" font-size="9">dbook vs Baseline scores</text>
  <rect x="45" y="205" width="170" height="18" rx="4" fill="#4c1d95"/>
  <text x="130" y="219" text-anchor="middle" fill="#c4b5fd" font-size="9">Token savings summary</text>

  <!-- Charts group -->
  <rect x="255" y="145" width="265" height="140" rx="12" fill="#1a1a2e" stroke="#334155" stroke-width="1.5"/>
  <text x="387" y="167" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="0.5">CHARTS</text>

  <!-- Radar Chart -->
  <rect x="270" y="178" width="112" height="90" rx="8" fill="url(#radarGrad)" filter="url(#shadow2)"/>
  <text x="326" y="202" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Radar Chart</text>
  <!-- Mini radar visualization -->
  <polygon points="326,218 346,230 340,252 312,252 306,230" fill="#60a5fa" opacity="0.3" stroke="#93c5fd" stroke-width="1"/>
  <polygon points="326,224 338,232 335,246 317,246 314,232" fill="#3b82f6" opacity="0.5" stroke="#bfdbfe" stroke-width="1"/>
  <text x="326" y="260" text-anchor="middle" fill="#bfdbfe" font-size="8">4 scoring dimensions</text>

  <!-- Token Bar Chart -->
  <rect x="393" y="178" width="112" height="90" rx="8" fill="url(#tokenGrad)" filter="url(#shadow2)"/>
  <text x="449" y="202" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Token Chart</text>
  <!-- Mini bar chart -->
  <rect x="413" y="214" width="18" height="40" rx="2" fill="#4ade80" opacity="0.6"/>
  <rect x="437" y="234" width="18" height="20" rx="2" fill="#16a34a"/>
  <rect x="461" y="224" width="18" height="30" rx="2" fill="#4ade80" opacity="0.6"/>
  <text x="449" y="260" text-anchor="middle" fill="#bbf7d0" font-size="8">by agent type</text>

  <!-- Heatmap -->
  <rect x="545" y="145" width="180" height="160" rx="10" fill="url(#heatmapGrad)" filter="url(#shadow2)"/>
  <text x="635" y="172" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Scenario Heatmap</text>
  <!-- Mini heatmap grid -->
  <g transform="translate(565, 184)">
    <!-- Row labels -->
    <text x="-2" y="10" text-anchor="end" fill="#fef3c7" font-size="7">B1</text>
    <text x="-2" y="23" text-anchor="end" fill="#fef3c7" font-size="7">B2</text>
    <text x="-2" y="36" text-anchor="end" fill="#fef3c7" font-size="7">C1</text>
    <text x="-2" y="49" text-anchor="end" fill="#fef3c7" font-size="7">C2</text>
    <text x="-2" y="62" text-anchor="end" fill="#fef3c7" font-size="7">S1</text>
    <!-- Grid cells - varying colors for score heatmap effect -->
    <rect x="4" y="1" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="21" y="1" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="38" y="1" width="14" height="11" rx="2" fill="#4ade80" opacity="0.7"/>
    <rect x="55" y="1" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="72" y="1" width="14" height="11" rx="2" fill="#ef4444" opacity="0.6"/>
    <rect x="89" y="1" width="14" height="11" rx="2" fill="#f59e0b" opacity="0.7"/>
    <rect x="106" y="1" width="14" height="11" rx="2" fill="#ef4444" opacity="0.5"/>
    <rect x="123" y="1" width="14" height="11" rx="2" fill="#f59e0b" opacity="0.6"/>

    <rect x="4" y="14" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="21" y="14" width="14" height="11" rx="2" fill="#4ade80" opacity="0.8"/>
    <rect x="38" y="14" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="55" y="14" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="72" y="14" width="14" height="11" rx="2" fill="#f59e0b" opacity="0.7"/>
    <rect x="89" y="14" width="14" height="11" rx="2" fill="#ef4444" opacity="0.6"/>
    <rect x="106" y="14" width="14" height="11" rx="2" fill="#f59e0b" opacity="0.6"/>
    <rect x="123" y="14" width="14" height="11" rx="2" fill="#ef4444" opacity="0.5"/>

    <rect x="4" y="27" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="21" y="27" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="38" y="27" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="55" y="27" width="14" height="11" rx="2" fill="#4ade80" opacity="0.8"/>
    <rect x="72" y="27" width="14" height="11" rx="2" fill="#f59e0b" opacity="0.7"/>
    <rect x="89" y="27" width="14" height="11" rx="2" fill="#f59e0b" opacity="0.6"/>
    <rect x="106" y="27" width="14" height="11" rx="2" fill="#ef4444" opacity="0.5"/>
    <rect x="123" y="27" width="14" height="11" rx="2" fill="#f59e0b" opacity="0.7"/>

    <rect x="4" y="40" width="14" height="11" rx="2" fill="#4ade80" opacity="0.8"/>
    <rect x="21" y="40" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="38" y="40" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="55" y="40" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="72" y="40" width="14" height="11" rx="2" fill="#ef4444" opacity="0.6"/>
    <rect x="89" y="40" width="14" height="11" rx="2" fill="#f59e0b" opacity="0.7"/>
    <rect x="106" y="40" width="14" height="11" rx="2" fill="#ef4444" opacity="0.5"/>
    <rect x="123" y="40" width="14" height="11" rx="2" fill="#f59e0b" opacity="0.6"/>

    <rect x="4" y="53" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="21" y="53" width="14" height="11" rx="2" fill="#4ade80" opacity="0.7"/>
    <rect x="38" y="53" width="14" height="11" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="55" y="53" width="14" height="11" rx="2" fill="#4ade80" opacity="0.8"/>
    <rect x="72" y="53" width="14" height="11" rx="2" fill="#f59e0b" opacity="0.7"/>
    <rect x="89" y="53" width="14" height="11" rx="2" fill="#f59e0b" opacity="0.6"/>
    <rect x="106" y="53" width="14" height="11" rx="2" fill="#ef4444" opacity="0.6"/>
    <rect x="123" y="53" width="14" height="11" rx="2" fill="#f59e0b" opacity="0.7"/>
  </g>
  <text x="635" y="264" text-anchor="middle" fill="#fef3c7" font-size="9">15 rows x 8 score columns</text>
  <text x="635" y="278" text-anchor="middle" fill="#fef3c7" font-size="8">color-coded 1-5</text>

  <!-- Left half: dbook scores, Right half: baseline scores -->
  <text x="601" y="294" text-anchor="middle" fill="#4ade80" font-size="7">dbook</text>
  <text x="669" y="294" text-anchor="middle" fill="#ef4444" font-size="7">baseline</text>

  <!-- Agent Cards -->
  <rect x="750" y="145" width="125" height="160" rx="10" fill="url(#agentCardGrad)" filter="url(#shadow2)"/>
  <text x="812" y="172" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Agent Cards</text>

  <rect x="762" y="184" width="100" height="30" rx="6" fill="#0369a1"/>
  <text x="812" y="200" text-anchor="middle" fill="#e0f2fe" font-size="10" font-weight="600">Billing</text>
  <text x="812" y="210" text-anchor="middle" fill="#7dd3fc" font-size="8">4.8/5</text>

  <rect x="762" y="220" width="100" height="30" rx="6" fill="#0369a1"/>
  <text x="812" y="236" text-anchor="middle" fill="#e0f2fe" font-size="10" font-weight="600">Care</text>
  <text x="812" y="246" text-anchor="middle" fill="#7dd3fc" font-size="8">4.8/5</text>

  <rect x="762" y="256" width="100" height="30" rx="6" fill="#0369a1"/>
  <text x="812" y="272" text-anchor="middle" fill="#e0f2fe" font-size="10" font-weight="600">Sales</text>
  <text x="812" y="282" text-anchor="middle" fill="#7dd3fc" font-size="8">4.5/5</text>

  <!-- Footer legend -->
  <rect x="30" y="325" width="840" height="35" rx="8" fill="#1a1a2e" stroke="#334155" stroke-width="1"/>
  <text x="450" y="347" text-anchor="middle" fill="#94a3b8" font-size="10">Generated by: pytest tests/ -v -s  |  Output: benchmarks/report.html + benchmarks/results.json</text>
</svg>
